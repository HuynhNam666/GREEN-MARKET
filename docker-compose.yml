version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: green_sql
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: ./Backend/GreenMarket.API
    container_name: green_api
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=GreenMarketDB;User=sa;Password=Your_password123;TrustServerCertificate=True;
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./Frontend
    container_name: green_web
    ports:
      - "3000:80"

volumes:
  sql_data: