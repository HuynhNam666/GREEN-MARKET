<!DOCTYPE html>
<html class="light" lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Chi tiết sản phẩm | Green Market</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="bg-background-light text-slate-900">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
      <header class="sticky top-0 z-50 w-full border-b border-forest/5 bg-background-light/90 backdrop-blur-md px-6 md:px-20 py-4 transition-all">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
          <div class="flex items-center gap-12">
            <div class="flex items-center gap-2 text-primary">
              <span class="material-symbols-outlined text-3xl">eco</span>
              <h2 class="text-xl font-extrabold tracking-tight font-display uppercase">Green Market</h2>
            </div>
            <nav class="hidden lg:flex items-center gap-8">
              <a class="text-forest/80 hover:text-primary text-sm font-bold transition-colors" href="../page/index.html">Trang chủ</a>
              <a class="text-forest/80 hover:text-primary text-sm font-bold transition-colors" href="../page/sanpham.html">Sản phẩm</a>
              <a class="text-forest/80 hover:text-primary text-sm font-bold transition-colors" href="../page/bosuutap.html">Bộ sưu tập</a>
              <a class="text-forest/80 hover:text-primary text-sm font-bold transition-colors" href="../page/chat.html">Tin nhắn</a>
            </nav>
          </div>
          <div class="flex items-center gap-4 lg:gap-6">
            <div class="hidden md:flex items-center bg-earth-beige/40 rounded-full px-4 py-1.5 border border-forest/5">
              <span class="material-symbols-outlined text-forest/40 text-xl">search</span>
              <input class="bg-transparent border-none focus:ring-0 text-sm w-48 placeholder:text-forest/40" placeholder="Tìm kiếm nông sản..." type="text" />
            </div>
            <div class="flex items-center gap-2">
              <a href="../page/giohang.html" class="p-2 hover:bg-earth-beige rounded-full transition-colors text-forest relative">
                <span class="material-symbols-outlined">shopping_cart</span>
                <span class="absolute top-1 right-1 bg-primary text-white text-[10px] font-bold px-1.5 rounded-full border-2 border-background-light">0</span>
              </a>
              <a href="../page/dangnhap.html" class="p-2 hover:bg-earth-beige rounded-full transition-colors text-forest relative">
                <span class="material-symbols-outlined">person</span>
              </a>
            </div>
          </div>
        </div>
      </header>

      <main class="flex-1">
        <section class="max-w-7xl mx-auto px-6 py-8">
          <nav class="flex items-center gap-2 text-sm text-slate-500 mb-8">
            <a class="hover:text-primary" href="../page/index.html">Trang chủ</a>
            <span class="material-symbols-outlined text-xs">chevron_right</span>
            <a class="hover:text-primary" href="../page/sanpham.html">Sản phẩm</a>
            <span class="material-symbols-outlined text-xs">chevron_right</span>
            <span id="breadcrumb-product-name" class="text-slate-900 font-medium">Chi tiết sản phẩm</span>
          </nav>

          <div id="product-detail"></div>
        </section>

        <section class="max-w-7xl mx-auto px-6 pb-20">
          <div class="flex items-end justify-between gap-6 mb-8">
            <div>
              <p class="text-sm font-bold uppercase tracking-widest text-primary">Khám phá thêm</p>
              <h2 class="mt-2 text-3xl md:text-4xl font-serif text-forest">Sản phẩm liên quan</h2>
            </div>
            <a href="../page/sanpham.html" class="font-bold text-primary hover:underline">Xem toàn bộ</a>
          </div>
          <div id="related-products" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
        </section>
      </main>

      <footer class="bg-earth-beige/30 border-t border-forest/10 py-10 text-center text-sm text-forest/60">
        © 2026 Green Market. Nông sản sạch kết nối trực tiếp với backend Green Market.
      </footer>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/chitietsanpham.js"></script>
  </body>
</html>
